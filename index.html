<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>最高の1日を選ぶ</title>
<meta name="theme-color" content="#fffafc">
<meta name="apple-mobile-web-app-title" content="最高の1日">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-512.png">
<style>
  :root{
    --bg:#fffafc; --card:#ffffff; --ink:#2b2f38; --sub:#9096a2; --line:#f4e7ee;
    --gold:#ff5a8a; --gold-d:#e63e73; --gold-lt:#f7b3c9; --gold-bg:#ffe9f0;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{
    background:
      radial-gradient(circle at 10% 12%,rgba(205,205,218,.55) 0,rgba(205,205,218,.55) .6px,transparent 1.5px),
      radial-gradient(circle at 82% 38%,rgba(255,255,255,.9) 0,rgba(255,255,255,.9) .6px,transparent 1.5px),
      radial-gradient(circle at 46% 86%,rgba(198,198,214,.5) 0,rgba(198,198,214,.5) .6px,transparent 1.4px),
      radial-gradient(circle at 68% 66%,rgba(255,255,255,.7) 0,rgba(255,255,255,.7) .5px,transparent 1.3px),
      var(--bg);
    background-size:72px 72px,94px 94px,82px 82px,60px 60px,100% 100%;
    background-attachment:fixed;
    color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",sans-serif;
    line-height:1.85; padding:26px 16px 230px; max-width:520px; margin:0 auto;
    -webkit-font-smoothing:antialiased;
  }

  header{ text-align:center; margin-bottom:22px; }
  .brand{ font-size:12px; letter-spacing:.42em; color:var(--gold-d);
    font-family:"Hiragino Mincho ProN",serif; }
  .brand-line{ width:36px; height:1px; margin:10px auto 14px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  .title{ font-size:23px; letter-spacing:.05em; font-weight:700; color:#e63e73;
    font-family:"Hiragino Mincho ProN","YuMincho",serif; margin:0; }
  .today{ font-size:13px; color:var(--sub); margin-top:9px;
    font-family:"Hiragino Mincho ProN",serif; letter-spacing:.05em; }

  .sec-h{ display:flex; align-items:center; gap:9px; margin:26px 3px 12px; }
  .sec-h .dot{ width:6px; height:6px; border-radius:50%; background:var(--gold); }
  .sec-h h2{ font-size:15px; font-weight:600; margin:0; letter-spacing:.04em;
    font-family:"Hiragino Mincho ProN",serif; color:var(--ink); }
  .sec-h .hint{ font-size:11.5px; color:var(--sub); margin-left:auto; }

  /* 選ぶ世界 */
  .world{ background:
      radial-gradient(circle at 12% 20%,#fff 0,#fff .8px,transparent 1.5px),
      radial-gradient(circle at 78% 28%,#d6d6e0 0,#d6d6e0 .7px,transparent 1.3px),
      radial-gradient(circle at 40% 74%,#fff 0,#fff .7px,transparent 1.3px),
      radial-gradient(circle at 88% 82%,#c9c9d4 0,#c9c9d4 .7px,transparent 1.3px),
      radial-gradient(circle at 24% 52%,#fff 0,#fff .6px,transparent 1.1px),
      radial-gradient(circle at 62% 60%,#dedee8 0,#dedee8 .6px,transparent 1.1px),
      linear-gradient(135deg,#ffd6e4,#ffe9f1);
    background-size:32px 32px,42px 42px,36px 36px,48px 48px,28px 28px,40px 40px,100% 100%;
    border:1px solid var(--gold-lt);
    border-radius:18px; padding:20px 18px; text-align:center;
    box-shadow:0 6px 20px -10px rgba(255,90,138,.4); }
  .world .wlabel{ font-size:10.5px; letter-spacing:.3em; color:var(--gold-d);
    font-family:"Hiragino Mincho ProN",serif; }
  .world .wtext{ font-size:19px; line-height:1.6; color:#e63e73; margin:8px 0 2px;
    font-family:"Hiragino Mincho ProN","YuMincho",serif; word-break:break-word; }
  .world .wedit{ font-size:12px; color:var(--sub); background:none; border:none;
    cursor:pointer; text-decoration:underline; margin-top:6px; }
  .world-add{ display:flex; gap:8px; }
  .world-add input{ flex:1; border:1px solid var(--line); background:#fff;
    border-radius:12px; padding:12px 13px; font-size:15px; color:var(--ink); }
  .world-add input:focus{ outline:none; border-color:var(--gold-lt); }
  .world-add button{ border:none; background:var(--gold-bg); color:var(--gold-d);
    border-radius:12px; padding:0 16px; font-size:14px; font-weight:700; cursor:pointer; }

  /* 今、創っているもの */
  .making{ display:flex; align-items:center; gap:10px; background:var(--card);
    border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:9px; }
  .making .mdot{ width:11px; height:11px; border-radius:50%; flex:none; }
  .making .mtext{ flex:1; font-size:14.5px; font-family:"Hiragino Mincho ProN",serif; }
  .making .mdel{ font-size:12px; color:var(--sub); background:none; border:none; cursor:pointer; padding:4px 6px; }
  .add-making{ display:flex; gap:8px; margin-top:4px; }
  .add-making input{ flex:1; border:1px solid var(--line); background:#fff;
    border-radius:12px; padding:11px 13px; font-size:14px; color:var(--ink); }
  .add-making input:focus{ outline:none; border-color:var(--gold-lt); }
  .add-making button{ border:none; background:var(--gold-bg); color:var(--gold-d);
    border-radius:12px; padding:0 16px; font-size:14px; font-weight:700; cursor:pointer; }
  .mempty{ font-size:12.5px; color:var(--sub); text-align:center; padding:8px 10px 14px; line-height:2; }

  /* 日付ナビ＆カレンダー */
  .datenav{ display:flex; align-items:center; gap:8px; margin:2px 0 2px; }
  .datenav .arw{ width:36px; height:36px; border-radius:50%; border:1px solid var(--line);
    background:#fff; color:var(--gold-d); font-size:16px; cursor:pointer; flex:none; }
  .datenav .lbl{ flex:1; text-align:center; font-size:14.5px; font-weight:700;
    font-family:"Hiragino Mincho ProN",serif; color:var(--ink); }
  .datenav .today-jump{ font-size:10.5px; color:var(--gold-d); display:block; margin-top:1px; font-family:inherit; font-weight:400; cursor:pointer; text-decoration:underline; }
  .datenav .calbtn{ width:36px; height:36px; border-radius:50%; border:1px solid var(--line);
    background:#fff; font-size:16px; cursor:pointer; flex:none; }
  .datenav .calbtn.on{ background:var(--gold-bg); border-color:var(--gold-lt); }
  .cal{ background:#fff; border:1px solid var(--line); border-radius:16px; padding:12px 12px 14px; margin:10px 0 2px;
    box-shadow:0 6px 18px -12px rgba(255,90,138,.4); }
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .cal-head button{ border:none; background:none; color:var(--gold-d); font-size:16px; cursor:pointer; padding:4px 12px; }
  .cal-head .ym{ font-size:14px; font-weight:700; font-family:"Hiragino Mincho ProN",serif; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .cal-wd{ text-align:center; font-size:10.5px; color:var(--sub); padding:3px 0 4px; }
  .cal-cell{ position:relative; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
    font-size:13px; border-radius:10px; cursor:pointer; color:var(--ink); }
  .cal-cell.blank{ cursor:default; }
  .cal-cell.today{ font-weight:800; color:var(--gold-d); }
  .cal-cell.sel{ background:linear-gradient(135deg,var(--gold),var(--gold-d)); color:#fff; font-weight:700; }
  .cal-cell .cdotm{ position:absolute; bottom:4px; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background:var(--gold); }
  .cal-cell.sel .cdotm{ background:#fff; }

  /* やること */
  .todo{ display:flex; align-items:flex-start; gap:12px; background:var(--card);
    border:1px solid var(--line); border-radius:15px; padding:14px 14px; margin-bottom:10px;
    animation:rise .35s ease; transition:background .35s, border-color .35s; }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .check{ width:24px; height:24px; border-radius:50%; border:1.8px solid var(--gold-lt);
    flex:none; margin-top:1px; cursor:pointer; position:relative; transition:.25s; }
  .check::after{ content:"✓"; position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; font-size:14px; color:#fff; opacity:0; transition:.25s; }
  .todo .body{ flex:1; min-width:0; }
  .todo .ttext{ font-size:15px; letter-spacing:.01em; word-break:break-word; }
  .todo .meta{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:7px; }
  .fchip{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px;
    color:var(--ink); background:#faf4f7; border:1px solid var(--line);
    border-radius:20px; padding:3px 10px; }
  .fchip .cdot{ width:8px; height:8px; border-radius:50%; }
  .carry{ font-size:11px; color:var(--gold-d); background:var(--gold-bg);
    border-radius:20px; padding:3px 9px; }
  .tdel{ font-size:12px; color:var(--sub); background:none; border:none; cursor:pointer;
    padding:4px 4px; margin-top:-2px; }
  .todo.done{ background:
      radial-gradient(circle at 16% 30%,#fff 0,#fff .7px,transparent 1.3px),
      radial-gradient(circle at 82% 60%,#d6d6e0 0,#d6d6e0 .6px,transparent 1.1px),
      radial-gradient(circle at 50% 85%,#fff 0,#fff .5px,transparent 1px),
      linear-gradient(135deg,#ffe9f1,#ffd9e6);
    background-size:30px 30px,40px 40px,26px 26px,100% 100%;
    border-color:var(--gold-lt); }
  .todo.done .check{ background:linear-gradient(135deg,var(--gold),var(--gold-d)); border-color:var(--gold-d); }
  .todo.done .check::after{ opacity:1; }
  .todo.done .ttext{ color:var(--gold-d); }
  .tempty{ text-align:center; color:var(--sub); font-size:13.5px; padding:26px 16px; line-height:2.1; }
  .cheer{ text-align:center; font-size:13px; color:var(--gold-d); margin:6px 0 2px;
    font-family:"Hiragino Mincho ProN",serif; letter-spacing:.03em; }

  /* 下の入力バー */
  .bar{ position:fixed; left:0; right:0; bottom:0; background:rgba(255,250,252,.95);
    backdrop-filter:blur(8px); border-top:1px solid var(--line); padding:12px 14px 16px;
    max-width:520px; margin:0 auto; }
  .bar .barday{ text-align:center; font-size:11px; color:var(--sub); margin-bottom:8px;
    font-family:"Hiragino Mincho ProN",serif; }
  .bar .frow{ display:flex; gap:7px; overflow-x:auto; padding-bottom:9px; scrollbar-width:none; }
  .bar .frow::-webkit-scrollbar{ display:none; }
  .barchip{ flex:none; display:inline-flex; align-items:center; gap:6px; font-size:12px;
    border:1px solid var(--line); background:#fff; color:var(--sub); border-radius:20px;
    padding:6px 12px; cursor:pointer; white-space:nowrap; }
  .barchip .cdot{ width:8px; height:8px; border-radius:50%; }
  .barchip.on{ background:var(--gold-bg); color:var(--gold-d); border-color:var(--gold-lt); font-weight:700; }
  .irow{ display:flex; gap:8px; }
  .irow input{ flex:1; border:1px solid var(--line); background:#fff; border-radius:14px;
    padding:13px 15px; font-size:15px; color:var(--ink); }
  .irow input:focus{ outline:none; border-color:var(--gold-lt); }
  .irow button{ border:none; color:#fff; border-radius:14px; padding:0 20px; font-size:15px;
    font-weight:700; cursor:pointer;
    background:
      radial-gradient(circle at 22% 26%,rgba(255,255,255,.95) 0,rgba(255,255,255,.95) .7px,transparent 1.3px),
      radial-gradient(circle at 68% 62%,rgba(225,225,235,.85) 0,rgba(225,225,235,.85) .6px,transparent 1.1px),
      radial-gradient(circle at 48% 40%,rgba(255,255,255,.8) 0,rgba(255,255,255,.8) .5px,transparent 1px),
      linear-gradient(135deg,var(--gold),var(--gold-d));
    background-size:24px 24px,30px 30px,20px 20px,100% 100%;
    box-shadow:0 8px 18px -8px rgba(255,90,138,.6); }
</style>
</head>
<body>

<header>
  <div class="brand">Be Grace</div>
  <div class="brand-line"></div>
  <h1 class="title">最高の1日を選ぶ</h1>
  <div class="today" id="today"></div>
</header>

<!-- 選ぶ世界 -->
<div class="sec-h">
  <span class="dot"></span><h2>選ぶ世界</h2>
  <span class="hint">ひとつ</span>
</div>
<div id="worldBox"></div>

<!-- 今、創っているもの -->
<div class="sec-h">
  <span class="dot"></span><h2>今、創っているもの</h2>
  <span class="hint">いくつでも</span>
</div>
<div id="makingList"></div>
<div class="add-making">
  <input id="makingInput" type="text" placeholder="その世界のために、今つくっているもの" maxlength="40">
  <button id="makingAdd">追加</button>
</div>

<!-- やること（日付で選ぶ） -->
<div class="sec-h">
  <span class="dot"></span><h2 id="todoHeadTitle">今日、やること</h2>
  <span class="hint" id="progressHint"></span>
</div>
<div class="datenav" id="datenav"></div>
<div id="calBox"></div>
<div id="cheer" class="cheer"></div>
<div id="todoList"></div>

<!-- 下の入力バー -->
<div class="bar" id="bar">
  <div class="barday" id="barday"></div>
  <div class="frow" id="barMakings"></div>
  <div class="irow">
    <input id="todoInput" type="text" placeholder="やること を入れる" maxlength="80">
    <button id="todoAdd">入れる</button>
  </div>
</div>

<script>
  var KEY = 'begrace-best-day';
  var PALETTE = ['#dd9aa6','#e6b877','#9aa2b8','#a9c2a0','#c6a4c4','#d8b48a','#7d86a6','#c98f7a'];
  var WD = ['日','月','火','水','木','金','土'];

  var state = load();
  var picked = null;      // todo追加時に選んでいる「創っているもの」のid
  var sel = todayStr();   // いま見ている日
  var calOpen = false;    // カレンダーの開閉
  var calY, calM;         // カレンダー表示中の年・月(0-11)
  (function(){ var d=new Date(); calY=d.getFullYear(); calM=d.getMonth(); })();

  function load(){
    try{
      var s = JSON.parse(localStorage.getItem(KEY));
      if(s && s.todos){
        if(!s.makings && s.futures) s.makings = s.futures;
        if(typeof s.world !== 'string') s.world = '';
        s.makings = s.makings || [];
        s.todos.forEach(function(t){
          if(t.makingId===undefined) t.makingId = (t.futureId!==undefined?t.futureId:null);
          if(!t.date) t.date = t.created || todayStr();   // 日付が無い古いデータを引き継ぎ
        });
        return s;
      }
    }catch(e){}
    return { world:'', makings:[], todos:[] };
  }
  function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

  function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function todayStr(){ return ymd(new Date()); }
  function parseYmd(s){ var p=s.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
  function addDays(s, n){ var d=parseYmd(s); d.setDate(d.getDate()+n); return ymd(d); }
  function uid(){ return Date.now().toString(36) + Math.floor(Math.random()*1000).toString(36); }

  function nextColor(){
    var used = state.makings.map(function(m){return m.color;});
    for(var i=0;i<PALETTE.length;i++){ if(used.indexOf(PALETTE[i])<0) return PALETTE[i]; }
    return PALETTE[state.makings.length % PALETTE.length];
  }
  function makingById(id){
    for(var i=0;i<state.makings.length;i++){ if(state.makings[i].id===id) return state.makings[i]; }
    return null;
  }

  /* ---- 選ぶ世界 ---- */
  function setWorld(){
    var el = document.getElementById('worldInput'); if(!el) return;
    var t = el.value.trim(); if(!t) return;
    state.world = t; save(); render();
  }
  function editWorld(){
    var t = prompt('選ぶ世界を書きなおす', state.world);
    if(t!=null){ state.world = t.trim() || state.world; save(); render(); }
  }

  /* ---- 今、創っているもの ---- */
  function addMaking(){
    var el = document.getElementById('makingInput'); var t = el.value.trim(); if(!t) return;
    state.makings.push({ id:uid(), text:t, color:nextColor() });
    el.value=''; save(); render();
  }
  function delMaking(id){
    var m = makingById(id);
    if(!confirm('「'+m.text+'」を消しますか？\n（これにつながっていたやることは、どこにもつながらなくなります）')) return;
    state.makings = state.makings.filter(function(m){return m.id!==id;});
    state.todos.forEach(function(t){ if(t.makingId===id) t.makingId=null; });
    if(picked===id) picked=null;
    save(); render();
  }

  /* ---- やること ---- */
  function addTodo(){
    var el = document.getElementById('todoInput'); var t = el.value.trim(); if(!t) return;
    var day = (sel < todayStr()) ? todayStr() : sel;   // 過去には入れない
    state.todos.push({ id:uid(), text:t, makingId:picked, done:false, date:day, created:todayStr(), doneDate:null });
    el.value=''; save(); render(); el.focus();
  }
  function toggleTodo(id){
    state.todos.forEach(function(t){
      if(t.id===id){ t.done = !t.done; t.doneDate = t.done ? todayStr() : null; }
    });
    save(); render();
  }
  function delTodo(id){
    state.todos = state.todos.filter(function(t){return t.id!==id;});
    save(); render();
  }

  /* ---- 日付の見出し ---- */
  function mdw(s){ var d=parseYmd(s); return (d.getMonth()+1)+'月'+d.getDate()+'日（'+WD[d.getDay()]+'）'; }
  function dateLabel(s){
    var today=todayStr();
    if(s===today) return '今日　'+mdw(s);
    if(s===addDays(today,1)) return '明日　'+mdw(s);
    if(s===addDays(today,-1)) return '昨日　'+mdw(s);
    return mdw(s);
  }
  function headTitle(s){
    var today=todayStr();
    if(s < today) return mdw(s)+' の記録';
    if(s===today) return '今日、やること';
    if(s===addDays(today,1)) return '明日、やること';
    return mdw(s)+'、やること';
  }

  /* ---- 表示 ---- */
  function render(){
    var today = todayStr();
    var d = new Date();
    document.getElementById('today').textContent = (d.getMonth()+1)+'月'+d.getDate()+'日（'+WD[d.getDay()]+'）';

    renderWorld();
    renderMakings();
    renderDatenav();
    renderCal();

    // 見出し
    document.getElementById('todoHeadTitle').textContent = headTitle(sel);

    // その日のやること
    var open, doneList;
    if(sel < today){
      // 過去＝記録：その日にやり終えたこと
      open = [];
      doneList = state.todos.filter(function(t){ return t.done && t.doneDate===sel; });
    }else if(sel===today){
      // 今日＝今日の予定＋過去からの持ち越し（未完了）
      open = state.todos.filter(function(t){ return !t.done && t.date<=today; });
      doneList = state.todos.filter(function(t){ return t.done && t.doneDate===today; });
    }else{
      // 未来＝その日の予定
      open = state.todos.filter(function(t){ return !t.done && t.date===sel; });
      doneList = state.todos.filter(function(t){ return t.done && t.doneDate===sel; });
    }

    var tl = document.getElementById('todoList');
    tl.innerHTML='';
    if(open.length===0 && doneList.length===0){
      var msg = (sel<today) ? 'この日の記録は ありません。'
               : (sel===today) ? '下の窓から、今日やることを入れてください。'
               : '下の窓から、この日のやることを入れてください。';
      tl.innerHTML = '<div class="tempty">'+msg+'</div>';
    }
    open.forEach(function(t){ tl.appendChild(todoRow(t, today)); });
    doneList.forEach(function(t){ tl.appendChild(todoRow(t, today)); });

    // 応援・数
    var total = open.length + doneList.length;
    var doneN = doneList.length;
    document.getElementById('progressHint').textContent = total? (doneN+' / '+total):'';
    var cheer = document.getElementById('cheer');
    if(sel<today){ cheer.textContent = doneN>0 ? ('この日は '+doneN+' つ、動きました🤍') : ''; }
    else{ cheer.textContent = doneN>0 ? ('今日は '+doneN+' つ、動けました🤍') : ''; }

    // 入力バー（過去は見るだけ→隠す）
    document.getElementById('bar').style.display = (sel<today) ? 'none' : '';
    document.getElementById('barday').textContent = (sel===today) ? '' : (dateLabel(sel)+' に入れます');
    renderBar();
  }

  function renderWorld(){
    var wb = document.getElementById('worldBox'); wb.innerHTML='';
    if(state.world){
      var card = document.createElement('div'); card.className='world';
      card.innerHTML = '<div class="wlabel">生きたい世界</div><div class="wtext"></div><button class="wedit">書きなおす</button>';
      card.querySelector('.wtext').textContent = state.world;
      card.querySelector('.wedit').onclick = editWorld;
      wb.appendChild(card);
    }else{
      var box = document.createElement('div'); box.className='world-add';
      box.innerHTML = '<input id="worldInput" type="text" placeholder="あなたが選ぶ世界を、ひとつ" maxlength="50"><button id="worldAdd">決める</button>';
      wb.appendChild(box);
      document.getElementById('worldAdd').onclick = setWorld;
      document.getElementById('worldInput').addEventListener('keydown', function(e){ if(e.key==='Enter') setWorld(); });
    }
  }

  function renderMakings(){
    var ml = document.getElementById('makingList'); ml.innerHTML='';
    if(state.makings.length===0){
      ml.innerHTML = '<div class="mempty">まだありません。<br>その世界のために、今つくっているものは？🤍</div>';
      return;
    }
    state.makings.forEach(function(m){
      var row = document.createElement('div'); row.className='making';
      row.innerHTML = '<span class="mdot" style="background:'+m.color+'"></span><span class="mtext"></span><button class="mdel">消す</button>';
      row.querySelector('.mtext').textContent = m.text;
      row.querySelector('.mdel').onclick = function(){ delMaking(m.id); };
      ml.appendChild(row);
    });
  }

  function renderDatenav(){
    var nav = document.getElementById('datenav'); nav.innerHTML='';
    var prev = document.createElement('button'); prev.className='arw'; prev.textContent='‹';
    prev.onclick = function(){ sel = addDays(sel,-1); syncCalMonth(); render(); };
    var lbl = document.createElement('div'); lbl.className='lbl';
    lbl.textContent = dateLabel(sel);
    if(sel!==todayStr()){
      var jump = document.createElement('span'); jump.className='today-jump'; jump.textContent='今日にもどる';
      jump.onclick = function(){ sel = todayStr(); syncCalMonth(); render(); };
      lbl.appendChild(jump);
    }
    var next = document.createElement('button'); next.className='arw'; next.textContent='›';
    next.onclick = function(){ sel = addDays(sel,1); syncCalMonth(); render(); };
    var calbtn = document.createElement('button'); calbtn.className='calbtn'+(calOpen?' on':''); calbtn.textContent='📅';
    calbtn.onclick = function(){ calOpen=!calOpen; if(calOpen) syncCalMonth(); render(); };
    nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next); nav.appendChild(calbtn);
  }

  function syncCalMonth(){ var d=parseYmd(sel); calY=d.getFullYear(); calM=d.getMonth(); }

  function dayHasTodo(s){
    return state.todos.some(function(t){ return t.date===s || (t.done && t.doneDate===s); });
  }

  function renderCal(){
    var box = document.getElementById('calBox'); box.innerHTML='';
    if(!calOpen) return;
    var cal = document.createElement('div'); cal.className='cal';

    var head = document.createElement('div'); head.className='cal-head';
    var pb=document.createElement('button'); pb.textContent='‹';
    pb.onclick=function(){ calM--; if(calM<0){calM=11;calY--;} render(); };
    var ym=document.createElement('div'); ym.className='ym'; ym.textContent=calY+'年 '+(calM+1)+'月';
    var nb=document.createElement('button'); nb.textContent='›';
    nb.onclick=function(){ calM++; if(calM>11){calM=0;calY++;} render(); };
    head.appendChild(pb); head.appendChild(ym); head.appendChild(nb);
    cal.appendChild(head);

    var grid = document.createElement('div'); grid.className='cal-grid';
    WD.forEach(function(w){ var c=document.createElement('div'); c.className='cal-wd'; c.textContent=w; grid.appendChild(c); });

    var first = new Date(calY, calM, 1);
    var startWd = first.getDay();
    var days = new Date(calY, calM+1, 0).getDate();
    var today = todayStr();
    for(var i=0;i<startWd;i++){ var b=document.createElement('div'); b.className='cal-cell blank'; grid.appendChild(b); }
    for(var day=1; day<=days; day++){
      var s = ymd(new Date(calY, calM, day));
      var cell = document.createElement('div'); cell.className='cal-cell';
      if(s===today) cell.className+=' today';
      if(s===sel) cell.className+=' sel';
      cell.textContent = day;
      if(dayHasTodo(s)){ var dot=document.createElement('span'); dot.className='cdotm'; cell.appendChild(dot); }
      (function(ss){ cell.onclick=function(){ sel=ss; render(); }; })(s);
      grid.appendChild(cell);
    }
    cal.appendChild(grid);
    box.appendChild(cal);
  }

  function todoRow(t, today){
    var row = document.createElement('div');
    row.className = 'todo' + (t.done?' done':'');
    var chk = document.createElement('div'); chk.className='check';
    chk.onclick = function(){ toggleTodo(t.id); };
    var body = document.createElement('div'); body.className='body';
    var txt = document.createElement('div'); txt.className='ttext'; txt.textContent = t.text;
    body.appendChild(txt);
    var meta = document.createElement('div'); meta.className='meta';
    var m = t.makingId ? makingById(t.makingId) : null;
    if(m){
      var chip = document.createElement('span'); chip.className='fchip';
      chip.innerHTML = '<span class="cdot" style="background:'+m.color+'"></span>';
      chip.appendChild(document.createTextNode('→ '+m.text+' の真っ最中'));
      meta.appendChild(chip);
    }
    if(!t.done && sel===today && t.date < today){
      var c = document.createElement('span'); c.className='carry'; c.textContent='持ち越し';
      meta.appendChild(c);
    }
    if(meta.children.length) body.appendChild(meta);
    var del = document.createElement('button'); del.className='tdel'; del.textContent='×';
    del.onclick = function(){ delTodo(t.id); };
    row.appendChild(chk); row.appendChild(body); row.appendChild(del);
    return row;
  }

  function renderBar(){
    var bf = document.getElementById('barMakings'); bf.innerHTML='';
    if(state.makings.length===0){ return; }
    state.makings.forEach(function(m){
      var c = document.createElement('div');
      c.className='barchip'+(picked===m.id?' on':'');
      c.innerHTML='<span class="cdot" style="background:'+m.color+'"></span>';
      c.appendChild(document.createTextNode(m.text));
      c.onclick=function(){ picked = (picked===m.id?null:m.id); renderBar(); };
      bf.appendChild(c);
    });
  }

  document.getElementById('makingAdd').onclick = addMaking;
  document.getElementById('makingInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addMaking(); });
  document.getElementById('todoAdd').onclick = addTodo;
  document.getElementById('todoInput').addEventListener('keydown', function(e){ if(e.key==='Enter') addTodo(); });

  render();
</script>
</body>
</html>
